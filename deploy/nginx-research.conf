# Streamlit 中古10サイト横断リサーチ用 nginx 設定
# サブドメイン research.irodori-system.com 専用 — 既存サイト設定には影響しない
# Let's Encrypt 取得後は certbot --nginx が自動で 443 ブロックを追加する

server {
    listen 80;
    server_name research.irodori-system.com;

    # Let's Encrypt 用パス
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Streamlit へリバースプロキシ
    location / {
        proxy_pass http://127.0.0.1:8501;
        proxy_http_version 1.1;

        # WebSocket サポート (Streamlit 必須)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 標準ヘッダ
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # タイムアウト（検索3〜5分かかるため長めに）
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        # バッファリング無効（Streamlit のストリーミングのため）
        proxy_buffering off;
    }

    # アップロードサイズ
    client_max_body_size 50M;
}
