# Streamlit 中古10サイト横断リサーチ用 nginx 設定
# サブドメイン research.irodori-system.com 専用 — 既存サイト設定には影響しない
# Let's Encrypt 取得後は certbot --nginx が自動で 443 ブロックを追加する

server {
    listen 80;
    server_name research.irodori-system.com;

    # Let's Encrypt 用パス
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # iPhone ホーム画面 / Android PWA 用アイコン (Streamlit を経由しない直接配信)
    location = /apple-touch-icon.png {
        alias /opt/research-tool/static/apple-touch-icon.png;
        expires 7d;
        access_log off;
    }
    location = /apple-touch-icon-precomposed.png {
        alias /opt/research-tool/static/apple-touch-icon.png;
        expires 7d;
        access_log off;
    }
    location = /icon-192.png {
        alias /opt/research-tool/static/apple-touch-icon-192.png;
        expires 7d;
        access_log off;
    }
    location = /icon-512.png {
        alias /opt/research-tool/static/apple-touch-icon-512.png;
        expires 7d;
        access_log off;
    }
    location = /manifest.json {
        alias /opt/research-tool/static/manifest.json;
        default_type application/json;
        expires 1d;
        access_log off;
    }

    # Streamlit へリバースプロキシ
    location / {
        proxy_pass http://127.0.0.1:8501;
        proxy_http_version 1.1;

        # WebSocket サポート (Streamlit 必須)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 標準ヘッダ
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # gzip を無効化 (sub_filter が動くように)
        proxy_set_header Accept-Encoding "";

        # タイムアウト（検索3〜5分かかるため長めに）
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        # バッファリング無効（Streamlit のストリーミングのため）
        proxy_buffering off;

        # iOS / Android 用 link タグを <head> に注入
        sub_filter '<head>' '<head><link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png"><link rel="manifest" href="/manifest.json"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="default"><meta name="apple-mobile-web-app-title" content="リサーチ">';
        sub_filter_once on;
        sub_filter_types text/html;
    }

    # アップロードサイズ
    client_max_body_size 50M;
}
